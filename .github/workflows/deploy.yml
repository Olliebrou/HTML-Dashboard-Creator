name: Deploy ChartPilot to GitHub Pages

on:
  # Deploy on every push to the main branch
  push:
    branches:
      - main

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN permissions to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: chartpilot/package-lock.json

      - name: Install dependencies
        working-directory: chartpilot
        run: npm ci

      - name: Lint
        working-directory: chartpilot
        run: npm run lint

      - name: Build
        working-directory: chartpilot
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chartpilot/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
